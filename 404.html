<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found | book.immo</title>
    <meta name="description" content="The page you are looking for was not found." />
    <style>
      :root {
        --bg: #f5f5f5;
        --card: #ffffff;
        --text: #191a20;
        --muted: #6c7078;
        --accent: #ff6625;
        --border: #e8e8e8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Lexend, "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .card {
        width: min(720px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px;
      }
      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      h1 {
        margin: 12px 0 10px;
        font-size: clamp(30px, 6vw, 54px);
        line-height: 1.05;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }
      .actions {
        margin-top: 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      a.btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
      }
      a.primary {
        background: var(--accent);
        color: #fff;
      }
      a.secondary {
        border: 1px solid var(--border);
        color: var(--text);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">404</p>
      <h1>Page not found</h1>
      <p>The requested URL does not exist or has moved. Use one of the links below to continue browsing.</p>
      <div class="actions">
        <a class="btn primary" id="homeLink" href="/en">Go to homepage</a>
        <a class="btn secondary" href="/en/pages/blog">Open blog</a>
      </div>
    </main>
    <script>
      (function () {
        var path = window.location.pathname || "";
        var locale = "en";
        var match = path.match(/^\/(en|de|fr|it|nl)(\/|$)/);
        if (match) locale = match[1];
        var home = document.getElementById("homeLink");
        if (home) home.href = "/" + locale;
      })();
    </script>
  </body>
</html>
