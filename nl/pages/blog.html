<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>book.immo Blog</title>
    <meta name="description" content="Latest property insights and market updates from book.immo" />
    <style>
      :root {
        --bg: #f5f5f5;
        --card: #ffffff;
        --text: #191a20;
        --muted: #6c7078;
        --accent: #ff6625;
        --border: #e8e8e8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Lexend, "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 16px 56px; }
      .topbar {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px 18px;
      }
      .brand { font-weight: 700; font-size: 20px; text-decoration: none; color: var(--text); }
      .nav { display: flex; gap: 16px; flex-wrap: wrap; }
      .nav a { text-decoration: none; color: var(--text); font-size: 14px; }
      .nav a.active { color: var(--accent); font-weight: 600; }
      .hero { margin: 26px 0 20px; }
      .eyebrow { color: var(--accent); font-size: 14px; margin: 0 0 8px; }
      h1 { margin: 0; font-size: clamp(28px, 4vw, 46px); line-height: 1.1; }
      .sub { margin: 12px 0 0; color: var(--muted); max-width: 760px; }
      .grid {
        margin-top: 26px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }
      .thumb { width: 100%; aspect-ratio: 16/10; object-fit: cover; background: #ececec; }
      .content { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
      .meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
      .title { margin: 0; font-size: 18px; line-height: 1.3; }
      .excerpt { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
      .read {
        margin-top: auto;
        color: var(--accent);
        font-size: 14px;
        text-decoration: none;
        font-weight: 600;
      }
      .state { margin-top: 18px; color: var(--muted); font-size: 14px; }
      .footer {
        margin-top: 42px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 14px;
      }
      @media (max-width: 980px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 680px) {
        .topbar { align-items: flex-start; flex-direction: column; }
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="topbar">
        <a class="brand" href="../">book.immo</a>
        <nav class="nav">
          <a href="../">Home</a>
          <a href="../search">Search Properties</a>
          <a href="../agent">Agent</a>
          <a class="active" href="./blog.html">Blog</a>
          <a href="../sign-up">Sign up</a>
          <span id="lang-switch"></span>
        </nav>
      </header>

      <section class="hero">
        <p class="eyebrow">Latest insights</p>
        <h1>book.immo Blog</h1>
        <p class="sub">Market trends, buying guides, and property insights from our team and agents.</p>
      </section>

      <section id="blog-grid" class="grid" aria-live="polite"></section>
      <div id="blog-state" class="state">Loading posts...</div>

      <footer class="footer">
        <span>Copyright © 2026 book.immo. All rights reserved.</span>
        <span><a href="../privacy-policy" style="color:inherit">Privacy Policy</a> · <a href="../terms-of-service" style="color:inherit">Terms</a></span>
      </footer>
    </main>

    <script>
      (function () {
        var DIRECTUS_BASE = (window.BOOKIMMO_DIRECTUS_URL || 'https://cms.book.immo').replace(/\/$/, '');
        var locale = (function () {
          var p = window.location.pathname || '/';
          var m = p.match(/^\/(en|de|fr|it|nl)(?=\/|$)/);
          return m ? m[1] : 'en';
        })();
        document.documentElement.lang = locale;
        document.cookie = 'lang=' + locale + '; path=/; max-age=31536000; samesite=lax';

        var grid = document.getElementById('blog-grid');
        var state = document.getElementById('blog-state');
        var switchHost = document.getElementById('lang-switch');

        function localizeHref(href) {
          if (!href) return href;
          if (href.indexOf('http://') === 0 || href.indexOf('https://') === 0 || href.indexOf('mailto:') === 0 || href.indexOf('tel:') === 0) return href;
          if (href.indexOf('#') === 0) return href;
          if (href.indexOf('/_local/') === 0 || href.indexOf('/public/') === 0) return href;
          if (href.indexOf('/en') === 0 || href.indexOf('/de') === 0 || href.indexOf('/fr') === 0 || href.indexOf('/it') === 0 || href.indexOf('/nl') === 0) {
            return '/' + locale + href.replace(/^\/(en|de|fr|it|nl)/, '');
          }
          if (href === '/') return '/' + locale;
          var normalized = href;
          if (normalized.indexOf('./') === 0) normalized = normalized.slice(1);
          if (normalized.indexOf('/') === 0) return '/' + locale + normalized;
          return '/' + locale + '/' + normalized.replace(/^\/+/, '');
        }

        function patchLinks() {
          document.querySelectorAll('a[href]').forEach(function (a) {
            a.setAttribute('href', localizeHref(a.getAttribute('href')));
          });
        }

        function renderLanguageSwitch() {
          if (!switchHost) return;
          var langs = ['en', 'de', 'fr', 'it', 'nl'];
          switchHost.style.display = 'inline-flex';
          switchHost.style.gap = '8px';
          switchHost.style.marginLeft = '8px';
          langs.forEach(function (lang) {
            var a = document.createElement('a');
            a.href = '/' + lang + '/pages/blog';
            a.textContent = lang.toUpperCase();
            a.style.textDecoration = 'none';
            a.style.color = 'inherit';
            a.style.opacity = lang === locale ? '1' : '0.65';
            a.style.fontWeight = lang === locale ? '700' : '500';
            a.addEventListener('click', function () {
              document.cookie = 'lang=' + lang + '; path=/; max-age=31536000; samesite=lax';
            });
            switchHost.appendChild(a);
          });
        }

        function asset(fileId) {
          return DIRECTUS_BASE + '/assets/' + encodeURIComponent(fileId) + '?fit=cover&width=1200&height=800&quality=80';
        }

        function fmtDate(value) {
          if (!value) return '';
          var d = new Date(value);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function render(posts) {
          grid.innerHTML = '';
          posts.forEach(function (post) {
            var el = document.createElement('article');
            el.className = 'card';
            el.innerHTML =
              '<img class="thumb" alt="Post cover" src="' + (post.cover_image ? asset(post.cover_image) : '') + '">' +
              '<div class="content">' +
              '<div class="meta"><span>' + (fmtDate(post.published_at || post.date_created) || 'Latest') + '</span><span>' + (post.author_name || 'book.immo') + '</span></div>' +
              '<h2 class="title"></h2>' +
              '<p class="excerpt"></p>' +
              '<a class="read" href="#">Read article</a>' +
              '</div>';
            el.querySelector('.title').textContent = post.title || 'Untitled post';
            el.querySelector('.excerpt').textContent = post.excerpt || 'Open the article for full details.';
            grid.appendChild(el);
          });
        }

        patchLinks();
        renderLanguageSwitch();

        fetch(
          DIRECTUS_BASE +
            '/items/blog_posts?filter[status][_eq]=published&sort[]=-published_at&sort[]=-date_created&limit=30&fields=title,slug,excerpt,cover_image,published_at,author_name,date_created'
        )
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          })
          .then(function (payload) {
            var posts = (payload && payload.data) || [];
            if (!posts.length) {
              state.textContent = 'No posts yet.';
              return;
            }
            render(posts);
            state.textContent = posts.length + ' posts loaded';
          })
          .catch(function (e) {
            console.warn('[bookimmo] blog page load failed', e);
            state.textContent = 'Failed to load posts.';
          });
      })();
    </script>
  </body>
</html>
